<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Teste Login</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:320px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.login { background:#22c55e; color:white; }
.register { background:#3b82f6; color:white; }

.error {
  color:#f87171;
  font-size:13px;
  margin-bottom:10px;
}

.ok {
  color:#4ade80;
  font-size:13px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login SaaS 🔐</h2>

  

<div id="msg" class="error"></div>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button class="login" id="btnLogin">Entrar</button>
  <button class="register" id="btnRegister">Criar conta</button>

  <div id="status" class="ok"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";


// 🔥 COLE SUA CONFIG AQUI
const firebaseConfig = {
  apiKey: "SUA_API_KEY_AQUI",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};


// ✅ Inicialização segura
let app, auth;

try {
  app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  console.log("✅ Firebase conectado");
} catch(e) {
  document.getElementById("msg").innerText = "Erro ao iniciar Firebase";
  console.error(e);
}


// ELEMENTOS
const email = document.getElementById("email");
const senha = document.getElementById("senha");
const msg = document.getElementById("msg");
const status = document.getElementById("status");


// LOGIN
document.getElementById("btnLogin").onclick = async () => {
  msg.innerText = "";

  try {
    await signInWithEmailAndPassword(auth, email.value, senha.value);
    status.innerText = "✅ Login realizado com sucesso!";
  } catch(e) {
    msg.innerText = traduzErro(e.code);
  }
};


// REGISTRO
document.getElementById("btnRegister").onclick = async () => {
  msg.innerText = "";

  try {
    await createUserWithEmailAndPassword(auth, email.value, senha.value);
    status.innerText = "✅ Conta criada!";
  } catch(e) {
    msg.innerText = traduzErro(e.code);
  }
};


// OBSERVADOR LOGIN
onAuthStateChanged(auth, (user) => {
  if(user){
    console.log("Logado:", user.email);
  }
});


// TRADUZ ERROS
function traduzErro(code){
  switch(code){
    case "auth/invalid-email": return "Email inválido";
    case "auth/user-not-found": return "Usuário não existe";
    case "auth/wrong-password": return "Senha incorreta";
    case "auth/email-already-in-use": return "Email já cadastrado";
    case "auth/weak-password": return "Senha muito fraca (mín 6)";
    default: return code;
  }
}

</script>

</body>
</html>
